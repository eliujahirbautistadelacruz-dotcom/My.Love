<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 Milove 💖</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="stars" id="stars"></div>

    <header>
        <h1>Denisse Angélica Cardona Santiago</h1>
        <p class="subtitle">Mi amor eterno 💕</p>
        <button onclick="toggleMusic()" class="music-btn">🎵 Música (Click aquí)</button>
    </header>

    <nav>
        <button onclick="showSection(0)">🏠 Inicio</button>
        <button onclick="showSection(1)">📸 Galería</button>
        <button onclick="showSection(2)">🎥 Videos</button>
        <button onclick="showSection(4)">❤️ Razones</button>
    </nav>

    <main>
        <section id="section-0" class="section active">
            <div class="hero">
                <h2>Para ti, mi Denisse Angélica ❤️</h2>
                <p>Te amo con todo mi corazón</p>
            </div>
        </section>

        <section id="section-1" class="section">
            <h2>Galería de Fotos 📸</h2>
            <div class="gallery" id="photo-gallery"></div>
        </section>

        <section id="section-2" class="section">
            <h2>Videos Especiales 🎥</h2>
            <div class="videos" id="video-container"></div>
        </section>

        <section id="section-4" class="section">
            <h2>Nuestra Historia: 50 Razones</h2>
            <ol id="reasons-list"></ol>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
